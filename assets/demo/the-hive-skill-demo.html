<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Hive Skill Demo</title>
<style>
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: #0F111A; color: #E2E8F0;
    font-family: 'Consolas', 'Courier New', monospace;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex; justify-content: center; align-items: center;
  }
  .container {
    width: 1200px; height: 675px;
    position: relative;
    background: #141724;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border: 1px solid #2B3045;
    overflow: hidden;
  }
  .terminal-header {
    height: 36px; background: #2B3045; width: 100%; position: absolute; top: 0; left: 0;
    display: flex; align-items: center; padding: 0 12px; box-sizing: border-box;
  }
  .dot { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; }
  .dot.red { background: #FF5F56; }
  .dot.yellow { background: #FFBD2E; }
  .dot.green { background: #27C93F; }
  .content { padding: 50px 30px 30px; font-size: 26px; line-height: 1.6; }
  .line { margin: 6px 0; }
  .prompt { color: #4ADE80; font-weight: bold; margin-right: 10px; }
  .role-queen { color: #E879F9; }
  .role-scout { color: #60A5FA; }
  .role-architect { color: #FBBF24; }
  .role-forger { color: #34D399; }
  .role-sentinel { color: #F87171; }
  .role-scribe { color: #94A3B8; }
  .cursor {
    display: inline-block;
    width: 12px;
    height: 24px;
    background-color: #E2E8F0;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="container">
  <div class="terminal-header">
    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
  </div>
  <div class="content" id="terminal"></div>
</div>
<script>
  const term = document.getElementById('terminal');
  let cursor = document.createElement('span');
  cursor.className = 'cursor';

  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  
  async function typeText(lineElem, text, speed = 30) {
    for (let char of text) {
      lineElem.textContent += char;
      await sleep(speed);
    }
  }

  async function addPromptLine(cmdText) {
    const line = document.createElement('div');
    line.className = 'line';
    const prompt = document.createElement('span');
    prompt.className = 'prompt';
    prompt.textContent = '>';
    const cmd = document.createElement('span');
    line.appendChild(prompt);
    line.appendChild(cmd);
    term.appendChild(line);
    line.appendChild(cursor);
    await sleep(400);
    await typeText(cmd, cmdText, 25);
    await sleep(200);
    line.removeChild(cursor);
  }

  function addOutputLine(htmlContent) {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = htmlContent;
    term.appendChild(line);
  }

  async function runDemo() {
    term.appendChild(cursor);
    await sleep(500);
    term.removeChild(cursor);

    await addPromptLine(' /plugin marketplace add yuzuruu29/the-hive-skill');
    addOutputLine('<span style="color: #94A3B8;">[Marketplace] Added registry yuzuruu29/the-hive-skill</span>');
    term.appendChild(cursor);
    await sleep(800);
    term.removeChild(cursor);

    await addPromptLine(' /plugin install hive-mind-council@the-hive-skill');
    addOutputLine('<span style="color: #94A3B8;">[Plugin] Installed hive-mind-council successfully.</span>');
    term.appendChild(cursor);
    await sleep(1000);
    term.removeChild(cursor);
    
    addOutputLine('<br>');

    await addPromptLine(' /hive-mind-council fix the login bug');
    term.appendChild(cursor);
    await sleep(600);
    
    addOutputLine('<span class="role-queen">[Queen]</span> Goal defined: Fix login bug. Success criteria: tests pass.');
    await sleep(1000);
    
    addOutputLine('<span class="role-scout">[Scout]</span> Inspected auth.ts and session.ts. Found missing token validation.');
    await sleep(1000);
    
    addOutputLine('<span class="role-architect">[Architect]</span> Plan: Add JWT verification step in auth.ts.');
    await sleep(1000);
    
    addOutputLine('<span class="role-forger">[Forger]</span> Implemented JWT verification logic.');
    await sleep(1000);
    
    addOutputLine('<span class="role-sentinel">[Sentinel]</span> Validated changes. All tests passing.');
    await sleep(1000);
    
    addOutputLine('<span class="role-scribe">[Scribe]</span> Bug fixed. Queen Final Decision: Complete.');
    term.appendChild(cursor);
  }
  
  runDemo();
</script>
</body>
</html>
